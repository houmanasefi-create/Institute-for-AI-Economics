name: Generate Weekly Briefing

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * 0"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Get website files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install feedparser

      - name: Run real briefing generator
        run: |
          python scripts/generate_weekly_briefing.py

      - name: Save changes back to GitHub
        run: |
          git config user.name "Institute Briefing Bot"
          git config user.email "bot@instituteofaieconomics.org"

          git add weekly-briefings
          git commit -m "Generate weekly research briefing" || echo "No changes to commit"

          git pull --rebase origin main
          git push origin main
