name: Weekly Briefing Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * 0"

permissions:
  contents: write

jobs:
  create-weekly-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Get website files
        uses: actions/checkout@v4

      - name: Generate weekly briefing
        run: |
          mkdir -p weekly-briefings

          DATE=$(TZ="Australia/Sydney" date +"%B %d, %Y")
          FILE_DATE=$(TZ="Australia/Sydney" date +"%Y-%m-%d")
          YEAR=$(TZ="Australia/Sydney" date +"%Y")

          cat > weekly-briefings/$FILE_DATE.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Weekly AI Economics Briefing - $DATE</title>
            <link rel="stylesheet" href="../style.css" />
          </head>
          <body>
            <nav>
              <a href="../index.html">Home</a>
              <a href="../research.html">Research</a>
              <a href="./index.html">Weekly Briefings</a>
              <a href="../infrastructure.html">Infrastructure</a>
              <a href="../institutions.html">Institutions</a>
              <a href="../distribution.html">Distribution</a>
              <a href="../contact.html">Contact</a>
            </nav>

            <main>
              <section>
                <p>Weekly briefing</p>
                <h1>AI Economics Weekly Briefing</h1>
                <p>$DATE</p>

                <p>
                  This weekly briefing tracks the most important signals across AI infrastructure,
                  compute, energy, chips, institutions, distribution, governance, and economic power.
                </p>
              </section>

              <section>
                <h2>Executive summary</h2>
                <p>
                  This week’s briefing is generated automatically as part of the Institute for AI Economics
                  weekly research system. The purpose is to identify important AI economy signals and turn
                  them into structured research intelligence for future essays, briefings, and policy analysis.
                </p>
              </section>

              <section>
                <h2>Top 5 research signals</h2>

                <article>
                  <h3>1. Compute as economic control</h3>
                  <p><strong>Area:</strong> AI infrastructure and market power</p>
                  <p>
                    Compute remains one of the main control points in the AI economy. Access to accelerators,
                    cloud capacity, data centers, and deployment infrastructure shapes who can build and scale
                    advanced AI systems.
                  </p>

                  <h4>Five core mental models</h4>
                  <ol>
                    <li>Compute is not a technical input. It is strategic capacity.</li>
                    <li>AI power concentrates around scarce infrastructure.</li>
                    <li>Training and inference economics create different forms of leverage.</li>
                    <li>Cloud providers sit between model builders and users.</li>
                    <li>Infrastructure ownership shapes market structure.</li>
                  </ol>

                  <h4>Five expert disagreements</h4>
                  <ol>
                    <li>Will compute become cheap or remain strategically scarce?</li>
                    <li>Will open models weaken infrastructure monopolies or increase dependency on them?</li>
                    <li>Is model quality or deployment capacity the real bottleneck?</li>
                    <li>Should governments build sovereign compute or buy from hyperscalers?</li>
                    <li>Will inference cost collapse fast enough to commoditize AI access?</li>
                  </ol>

                  <h4>Ten questions that test deep understanding</h4>
                  <ol>
                    <li>Why is compute a governance layer?</li>
                    <li>How does inference economics differ from training economics?</li>
                    <li>Who captures value when models become cheaper?</li>
                    <li>Why do cloud providers gain power in AI markets?</li>
                    <li>What makes sovereign compute different from cloud procurement?</li>
                    <li>How can infrastructure scarcity shape AI competition?</li>
                    <li>Why does latency matter in AI deployment?</li>
                    <li>What happens when model access is abundant but compute access is scarce?</li>
                    <li>How do chips, energy, and data centers interact?</li>
                    <li>Which layer of the AI stack is hardest to route around?</li>
                  </ol>
                </article>

                <article>
                  <h3>2. Energy as the hidden AI constraint</h3>
                  <p><strong>Area:</strong> Power systems, data centers, and industrial strategy</p>
                  <p>
                    AI data center growth is turning electricity supply, grid connection, and power procurement
                    into central economic questions.
                  </p>
                </article>

                <article>
                  <h3>3. Chips as geopolitical leverage</h3>
                  <p><strong>Area:</strong> Semiconductors and national power</p>
                  <p>
                    Advanced chips, packaging, supply chains, and export controls remain central to AI capability.
                  </p>
                </article>

                <article>
                  <h3>4. Enterprise AI adoption gap</h3>
                  <p><strong>Area:</strong> Institutional adaptation</p>
                  <p>
                    Many organizations can access AI tools, but fewer can redesign workflows, incentives,
                    governance, and accountability around AI systems.
                  </p>
                </article>

                <article>
                  <h3>5. Distribution and value capture</h3>
                  <p><strong>Area:</strong> Platforms, interfaces, and economic control</p>
                  <p>
                    AI value will not only accrue to model builders. It will accrue to those who control
                    workflow access, trust, customer relationships, and distribution.
                  </p>
                </article>
              </section>

              <section>
                <h2>Links and sources to review</h2>
                <ul>
                  <li><a href="https://www.iea.org/">International Energy Agency</a></li>
                  <li><a href="https://www.semiconductors.org/">Semiconductor Industry Association</a></li>
                  <li><a href="https://www.nist.gov/artificial-intelligence">NIST Artificial Intelligence</a></li>
                  <li><a href="https://oecd.ai/">OECD AI Policy Observatory</a></li>
                  <li><a href="https://hai.stanford.edu/">Stanford HAI</a></li>
                </ul>
              </section>

              <section>
                <p><a href="./index.html">Back to all weekly briefings</a></p>
              </section>
            </main>

            <footer>
              <p>© Institute for AI Economics $YEAR</p>
            </footer>
          </body>
          </html>
          EOF

          cat > weekly-briefings/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Weekly Briefings - Institute for AI Economics</title>
            <link rel="stylesheet" href="../style.css" />
          </head>
          <body>
            <nav>
              <a href="../index.html">Home</a>
              <a href="../research.html">Research</a>
              <a href="./index.html">Weekly Briefings</a>
              <a href="../infrastructure.html">Infrastructure</a>
              <a href="../institutions.html">Institutions</a>
              <a href="../distribution.html">Distribution</a>
              <a href="../contact.html">Contact</a>
            </nav>

            <main>
              <section>
                <h1>Weekly Briefings</h1>
                <p>
                  Weekly research briefings on AI infrastructure, institutions, compute, energy,
                  distribution, governance, and economic power.
                </p>
              </section>

              <section>
                <h2>Latest briefing</h2>
                <p><a href="./$FILE_DATE.html">AI Economics Weekly Briefing - $DATE</a></p>
              </section>
            </main>

            <footer>
              <p>© Institute for AI Economics $YEAR</p>
            </footer>
          </body>
          </html>
          EOF

      - name: Save new briefing to GitHub
        run: |
          git config user.name "Institute Briefing Bot"
          git config user.email "bot@instituteofaieconomics.org"
          git add weekly-briefings
          git commit -m "Add weekly briefing" || echo "No changes"
          git push
